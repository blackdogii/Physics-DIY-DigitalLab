<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理實驗室：隔空感測雷達 (修正版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .card { background: #16213e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 600px; margin: auto; }
        #strength-val { font-size: 3rem; color: #0f3460; background: #e94560; border-radius: 10px; padding: 10px; display: inline-block; margin: 10px 0; min-width: 150px; }
        .btn { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn:disabled { background: #555; }
        .export-btn { background: #4ecca3; }
        canvas { margin-top: 20px; background: #0f3460; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📡 隔空感測物理雷達 v1.1</h2>
        <button id="connectBtn" class="btn">連線藍牙感測器</button>
        <button id="exportBtn" class="btn export-btn">導出 CSV 數據</button>
        <div id="status" style="color:#e94560; margin:10px;">狀態：尚未連線</div>
        
        <div id="strength-val">0</div>
        <div id="dist-result" style="color:#4ecca3; font-size:1.2rem;">預估距離：-- cm</div>

        <canvas id="radarChart"></canvas>
    </div>

    <script>
        let bleDevice, char;
        let k_constant = 1000;
        let logData = [["Timestamp", "Signal_Strength"]]; // CSV 數據容器

        async function connectBLE() {
            try {
                // 關鍵修正：使用 0xffe0 十六進位格式，解決 image_ad2bfa.png 的錯誤
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Physics_Radar' }],
                    optionalServices: [0xffe0] 
                });
                
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(0xffe0);
                char = await service.getCharacteristic(0xffe1);
                
                document.getElementById('status').innerText = "狀態：已連線";
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    const strength = parseInt(val);
                    updateUI(strength);
                    logData.push([new Date().toLocaleTimeString(), strength]);
                });
            } catch (err) {
                alert("連線失敗：" + err);
            }
        }

        function updateUI(strength) {
            document.getElementById('strength-val').innerText = strength;
            if (strength > 10) {
                const dist = (k_constant / Math.sqrt(strength)).toFixed(1);
                document.getElementById('dist-result').innerText = `預估距離：${dist} cm`;
            }
            updateChart(strength);
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8," + logData.map(e => e.join(",")).join("\n");
            let encodedUri = encodeURI(csvContent);
            let link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "radar_data.csv");
            document.body.appendChild(link);
            link.click();
        }

        // 圖表邏輯 (省略...維持原樣)
        document.getElementById('connectBtn').addEventListener('click', connectBLE);
        document.getElementById('exportBtn').addEventListener('click', exportCSV);
    </script>
</body>
</html>
